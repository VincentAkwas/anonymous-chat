<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anonymous Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#F0F2F5;height:100vh;display:flex;flex-direction:column}
.header{background:#075E54;color:white;padding:14px 16px}
.header h1{font-size:17px}
.header p{font-size:12px;opacity:0.85}
.chat-area{flex:1;overflow-y:auto;padding:12px;background:#E5DDD5;display:flex;flex-direction:column;gap:8px}
.bubble{background:white;border-radius:0 8px 8px 8px;padding:8px 10px;max-width:85%;box-shadow:0 1px 1px rgba(0,0,0,0.1)}
.meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:white}
.name{font-size:12px;font-weight:600;color:#075E54}
.time{font-size:10px;color:#aaa}
.text{font-size:14px;line-height:1.45;color:#1a1a1a;word-break:break-word}
.input-row{background:#F0F2F5;padding:8px 10px;display:flex;align-items:flex-end;gap:8px;border-top:1px solid #ddd}
textarea{flex:1;border:none;border-radius:20px;padding:9px 14px;font-size:14px;resize:none;background:white;outline:none;font-family:sans-serif}
.btn{width:44px;height:44px;border-radius:50%;background:#25D366;border:none;color:white;font-size:20px;cursor:pointer}
.btn:disabled{background:#ccc}
.bar{background:white;padding:4px 14px;font-size:11px;color:#888;border-top:1px solid #eee}
.empty{text-align:center;color:#888;margin:auto;padding:40px 20px}
.empty div{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>
<div class="header">
  <h1>&#128274; Anonymous Chat</h1>
  <p>No names &bull; No tracking &bull; Just chat</p>
</div>
<div class="chat-area" id="chat">
  <div class="empty" id="empty">
    <div>&#128274;</div>
    <p>No messages yet.<br>Be the first!</p>
  </div>
</div>
<div class="input-row">
  <textarea id="inp" rows="1" placeholder="Type anonymously..."></textarea>
  <button class="btn" id="btn">&#9658;</button>
</div>
<div class="bar" id="bar">0 messages</div>
<script>
var GAS = "https://script.google.com/macros/s/AKfycbwCxbr8W0gYVFZ2D6OCpxxz_Jw4CuJvkTaGmukhA5utitttUUROmR78R2UDIR76ZXEE/exec";
var last = 0;

function load() {
  fetch(GAS + "?action=getMessages")
    .then(function(r){ return r.json(); })
    .then(function(messages) {
      if (!messages || !messages.length) return;
      if (messages.length === last) return;
      var chat = document.getElementById('chat');
      var empty = document.getElementById('empty');
      if (empty) empty.style.display = 'none';
      chat.innerHTML = '';
      messages.forEach(function(m) {
        var div = document.createElement('div');
        div.className = 'bubble';
        var d = new Date(m.timestamp);
        var t = isNaN(d) ? '' : d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        var ini = m.anonymous_id ? m.anonymous_id.slice(-2).toUpperCase() : '??';
        var safe = String(m.content).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        div.innerHTML = '<div class="meta"><div class="avatar" style="background:'+m.color+'">'+ini+'</div><span class="name">Anonymous</span><span class="time">'+t+'</span></div><div class="text">'+safe+'</div>';
        chat.appendChild(div);
      });
      chat.scrollTop = chat.scrollHeight;
      last = messages.length;
      document.getElementById('bar').textContent = messages.length + ' messages';
    })
    .catch(function(e){ console.log('load error',e); });
}

function send() {
  var inp = document.getElementById('inp');
  var btn = document.getElementById('btn');
  var text = inp.value.trim();
  if (!text) return;
  btn.disabled = true;
  fetch(GAS, {
    method: 'POST',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({ action: 'sendMessage', message: text })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.status === 'ok') {
      inp.value = '';
      load();
    }
    btn.disabled = false;
  })
  .catch(function(e) {
    btn.disabled = false;
    alert('Failed. Try again.');
  });
}

document.getElementById('btn').onclick = send;
document.getElementById('inp').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
};

load();
setInterval(load, 3000);
</script>
</body>
</html>
